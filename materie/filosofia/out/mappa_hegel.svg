<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1122 794" width="1122" height="794"
     style="font-family: Georgia, 'Times New Roman', serif; background: #ffffff;">

  <title>Mappa concettuale: Hegel — La Razionalità del Reale e la Dialettica</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#aaa"
            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══ NODO CENTRALE ══ cx=561 y=28..82 -->
  <rect x="281" y="28" width="560" height="54" rx="12"
        fill="#1a3a1a" stroke="#0a200a" stroke-width="1"/>
  <text x="561" y="51" text-anchor="middle"
        font-size="17" font-weight="bold" fill="#ffffff">Georg Wilhelm Friedrich Hegel (1770–1831)</text>
  <text x="561" y="72" text-anchor="middle"
        font-size="11" fill="#90c890">Idealismo assoluto — massima espressione dell'idealismo tedesco</text>

  <!-- ══ ROW 2: due concetti fondanti ══ y=100..175 -->

  <!-- Frecce -->
  <path d="M430 82 L430 94 L220 94 L220 100"
        fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"
        marker-end="url(#arr-d)"/>
  <path d="M692 82 L692 94 L900 94 L900 100"
        fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"
        marker-end="url(#arr-d)"/>

  <!-- Razionalità del reale: x=50 y=100 w=340 h=75 -->
  <rect x="50" y="100" width="340" height="75" rx="9"
        fill="#1a3a1a" stroke="#0a200a" stroke-width="0.8"/>
  <text x="220" y="122" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#ffffff">Razionalità del reale</text>
  <line x1="68" y1="130" x2="372" y2="130" stroke="#507050" stroke-width="0.5"/>
  <text x="220" y="146" text-anchor="middle" font-size="10" font-style="italic" fill="#c0e8c0">«Ciò che è razionale è reale;</text>
  <text x="220" y="161" text-anchor="middle" font-size="10" font-style="italic" fill="#c0e8c0">ciò che è reale è razionale»</text>

  <!-- Dialettica: x=410 y=100 w=662 h=75 -->
  <rect x="410" y="100" width="662" height="75" rx="9"
        fill="#2a3a1a" stroke="#1a2a0a" stroke-width="0.8"/>
  <text x="741" y="122" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#ffffff">La Dialettica (Aufhebung)</text>
  <line x1="428" y1="130" x2="1054" y2="130" stroke="#608060" stroke-width="0.5"/>
  <!-- 3 momenti inline -->
  <text x="530" y="147" text-anchor="middle" font-size="11" font-weight="bold" fill="#a0d0a0">Tesi</text>
  <text x="530" y="162" text-anchor="middle" font-size="10" fill="#90c090">Affermazione</text>
  <line x1="600" y1="133" x2="600" y2="172" stroke="#507050" stroke-width="0.5"/>
  <text x="741" y="147" text-anchor="middle" font-size="11" font-weight="bold" fill="#a0d0a0">Antitesi</text>
  <text x="741" y="162" text-anchor="middle" font-size="10" fill="#90c090">Negazione / contraddizione</text>
  <line x1="880" y1="133" x2="880" y2="172" stroke="#507050" stroke-width="0.5"/>
  <text x="968" y="147" text-anchor="middle" font-size="11" font-weight="bold" fill="#a0d0a0">Sintesi</text>
  <text x="968" y="162" text-anchor="middle" font-size="10" fill="#90c090">Superamento che conserva</text>

  <!-- ══ ROW 3: TRIADE DELL'ASSOLUTO ══ y=195..295 -->

  <!-- Freccia razionalità → triade -->
  <line x1="561" y1="175" x2="561" y2="197"
        stroke="#3a6a3a" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- sfondo banda -->
  <rect x="30" y="197" width="1062" height="98" rx="9"
        fill="#f0f8f0" stroke="#90b890" stroke-width="0.5"/>
  <text x="561" y="214" text-anchor="middle"
        font-size="10" fill="#507050" font-style="italic">Il movimento dialettico dell'Assoluto</text>

  <!-- TESI — Idea in sé: x=42 y=220 w=320 h=65 -->
  <rect x="42" y="220" width="320" height="65" rx="8"
        fill="#ddeedd" stroke="#3a7a3a" stroke-width="0.8"/>
  <text x="202" y="241" text-anchor="middle" font-size="12" font-weight="bold" fill="#0a3a0a">TESI — L'Idea in sé (Logos)</text>
  <text x="202" y="257" text-anchor="middle" font-size="10" fill="#1a5a1a">Puro pensiero astratto</text>
  <text x="202" y="272" text-anchor="middle" font-size="10" fill="#1a5a1a">Studiata dalla Logica</text>

  <!-- ANTITESI — Natura: x=401 y=220 w=320 h=65 -->
  <rect x="401" y="220" width="320" height="65" rx="8"
        fill="#ddeedd" stroke="#3a7a3a" stroke-width="0.8"/>
  <text x="561" y="241" text-anchor="middle" font-size="12" font-weight="bold" fill="#0a3a0a">ANTITESI — L'Idea fuori di sé (Natura)</text>
  <text x="561" y="257" text-anchor="middle" font-size="10" fill="#1a5a1a">L'Idea si esteriorizza — alienazione</text>
  <text x="561" y="272" text-anchor="middle" font-size="10" fill="#1a5a1a">Studiata dalla Filosofia della Natura</text>

  <!-- SINTESI — Spirito: x=760 y=220 w=320 h=65 -->
  <rect x="760" y="220" width="320" height="65" rx="8"
        fill="#c0e0c0" stroke="#2a6a2a" stroke-width="1"/>
  <text x="920" y="241" text-anchor="middle" font-size="12" font-weight="bold" fill="#0a3a0a">SINTESI — L'Idea in sé e per sé (Spirito)</text>
  <text x="920" y="257" text-anchor="middle" font-size="10" fill="#1a5a1a">L'Idea consapevole di sé — la più importante</text>
  <text x="920" y="272" text-anchor="middle" font-size="10" fill="#1a5a1a">Studiata dalla Filosofia dello Spirito</text>

  <!-- Frecce tesi→antitesi→sintesi -->
  <line x1="362" y1="252" x2="399" y2="252" stroke="#3a7a3a" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="721" y1="252" x2="758" y2="252" stroke="#3a7a3a" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ══ ROW 4: FILOSOFIA DELLO SPIRITO — 3 colonne ══ y=315..470 -->

  <!-- Freccia Spirito → riga 4 -->
  <line x1="920" y1="285" x2="920" y2="308"
        stroke="#2a6a2a" stroke-width="1.2" marker-end="url(#arr)"/>
  <path d="M920 308 L920 315" fill="none" stroke="#2a6a2a" stroke-width="1.2"/>

  <!-- Label -->
  <text x="561" y="311" text-anchor="middle"
        font-size="10" fill="#507050" font-style="italic">Filosofia dello Spirito — tre momenti dialettici</text>

  <!-- Linee di connessione verso le 3 colonne -->
  <path d="M920 315 L920 320 L220 320 L220 326"
        fill="none" stroke="#2a6a2a" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M920 315 L920 320 L561 320 L561 326"
        fill="none" stroke="#2a6a2a" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="920" y1="315" x2="920" y2="326"
        stroke="#2a6a2a" stroke-width="1" marker-end="url(#arr)"/>

  <!-- SPIRITO SOGGETTIVO: x=50 y=326 w=330 h=144 -->
  <rect x="50" y="326" width="330" height="144" rx="9"
        fill="#e8f4e8" stroke="#3a7a3a" stroke-width="0.8"/>
  <text x="215" y="348" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#0a4020">Spirito Soggettivo (tesi)</text>
  <text x="215" y="364" text-anchor="middle" font-size="10" fill="#1a5a2a">Lo Spirito nell'individuo</text>
  <line x1="68" y1="372" x2="362" y2="372" stroke="#70b070" stroke-width="0.5"/>
  <text x="215" y="387" text-anchor="middle" font-size="10" fill="#1a5a2a">Anima → Coscienza → Soggetto conoscente</text>
  <text x="215" y="402" text-anchor="middle" font-size="10" fill="#1a5a2a">Dialettica servo-padrone:</text>
  <text x="215" y="417" text-anchor="middle" font-size="10" fill="#1a5a2a">il lavoro come via alla libertà</text>
  <text x="215" y="432" text-anchor="middle" font-size="10" fill="#1a5a2a">Stoicismo → Scetticismo →</text>
  <text x="215" y="447" text-anchor="middle" font-size="10" fill="#1a5a2a">Coscienza infelice (religiosa)</text>
  <text x="215" y="462" text-anchor="middle" font-size="10" font-style="italic" fill="#2a7a3a">Fenomenologia dello Spirito (1807)</text>

  <!-- SPIRITO OGGETTIVO: x=396 y=326 w=330 h=144 -->
  <rect x="396" y="326" width="330" height="144" rx="9"
        fill="#e8f4e8" stroke="#3a7a3a" stroke-width="0.8"/>
  <text x="561" y="348" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#0a4020">Spirito Oggettivo (antitesi)</text>
  <text x="561" y="364" text-anchor="middle" font-size="10" fill="#1a5a2a">Lo Spirito nella vita sociale e collettiva</text>
  <line x1="414" y1="372" x2="708" y2="372" stroke="#70b070" stroke-width="0.5"/>
  <text x="561" y="387" text-anchor="middle" font-size="10" fill="#1a5a2a">Diritto astratto → Moralità → Eticità</text>
  <text x="561" y="402" text-anchor="middle" font-size="10" fill="#1a5a2a">Famiglia → Società civile → Stato</text>
  <text x="561" y="417" text-anchor="middle" font-size="10" fill="#1a5a2a">«Il popolo non ha senso al di fuori dello Stato»</text>
  <text x="561" y="432" text-anchor="middle" font-size="10" fill="#1a5a2a">Storia del Mondo: astuzia della Ragione</text>
  <text x="561" y="447" text-anchor="middle" font-size="10" fill="#1a5a2a">Oriente → Grecia/Roma → Germania</text>
  <text x="561" y="462" text-anchor="middle" font-size="10" font-style="italic" fill="#2a7a3a">Monarchia costituzionale — forma migliore</text>

  <!-- SPIRITO ASSOLUTO: x=742 y=326 w=330 h=144 -->
  <rect x="742" y="326" width="330" height="144" rx="9"
        fill="#c8eac8" stroke="#2a6a2a" stroke-width="1"/>
  <text x="907" y="348" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#0a3a0a">Spirito Assoluto (sintesi)</text>
  <text x="907" y="364" text-anchor="middle" font-size="10" fill="#1a5a1a">Tutto è Spirito — massima consapevolezza</text>
  <line x1="760" y1="372" x2="1054" y2="372" stroke="#70b070" stroke-width="0.5"/>
  <text x="907" y="387" text-anchor="middle" font-size="10" fill="#1a5a1a">Arte (forma sensibile)</text>
  <text x="907" y="402" text-anchor="middle" font-size="10" fill="#1a5a1a">→ Religione (rappresentazione)</text>
  <text x="907" y="417" text-anchor="middle" font-size="10" fill="#1a5a1a">→ Filosofia (concetto puro)</text>
  <text x="907" y="437" text-anchor="middle" font-size="10" fill="#1a5a1a">Stesso contenuto (l'Assoluto),</text>
  <text x="907" y="452" text-anchor="middle" font-size="10" fill="#1a5a1a">forme diverse di espressione</text>
  <text x="907" y="467" text-anchor="middle" font-size="10" font-style="italic" fill="#2a6a1a">Panlogismo: tutto ricondotto alla Ragione</text>

  <!-- ══ ROW 5: NOTTOLA + DESTRA/SINISTRA ══ y=492..580 -->

  <!-- Frecce row4 → row5 -->
  <path d="M215 470 L215 484 L220 484 L220 492"
        fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M907 470 L907 484 L840 484 L840 492"
        fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Nottola di Minerva: x=50 y=492 w=460 h=88 -->
  <rect x="50" y="492" width="460" height="88" rx="9"
        fill="#f5f0e0" stroke="#907020" stroke-width="0.8"/>
  <text x="280" y="514" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#4a3000">La nottola di Minerva</text>
  <line x1="68" y1="522" x2="492" y2="522" stroke="#c0a040" stroke-width="0.5"/>
  <text x="280" y="538" text-anchor="middle" font-size="10" fill="#6a4000">La filosofia non prescrive, descrive: viene dopo i fatti</text>
  <text x="280" y="553" text-anchor="middle" font-size="10" fill="#6a4000">Come la civetta, inizia la sua attività al tramonto</text>
  <text x="280" y="568" text-anchor="middle" font-size="10" font-style="italic" fill="#7a5000">«Nessuna filosofia oltrepassa la sua età»</text>

  <!-- Destra e Sinistra hegeliana: x=530 y=492 w=542 h=88 -->
  <rect x="530" y="492" width="542" height="88" rx="9"
        fill="#eeeaf8" stroke="#6050a0" stroke-width="0.8"/>
  <text x="801" y="514" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#1a0860">Destra e Sinistra hegeliana (dal 1837)</text>
  <line x1="548" y1="522" x2="1054" y2="522" stroke="#a090d0" stroke-width="0.5"/>
  <!-- due colonne -->
  <text x="660" y="538" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a1870">Destra</text>
  <text x="660" y="553" text-anchor="middle" font-size="10" fill="#3a2880">Concilia Hegel con la religione</text>
  <text x="660" y="568" text-anchor="middle" font-size="10" fill="#3a2880">e il Cristianesimo</text>
  <line x1="798" y1="525" x2="798" y2="577" stroke="#c0b0e0" stroke-width="0.5"/>
  <text x="928" y="538" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a1870">Sinistra</text>
  <text x="928" y="553" text-anchor="middle" font-size="10" fill="#3a2880">Nega ogni trascendenza</text>
  <text x="928" y="568" text-anchor="middle" font-size="10" fill="#3a2880">Feuerbach, Marx: cambiare la realtà</text>

  <!-- ══ SINTESI FINALE ══ y=600..655 -->

  <path d="M280 580 L280 592 L561 592 L561 600"
        fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M801 580 L801 592 L561 592"
        fill="none" stroke="#555" stroke-width="1"/>

  <rect x="80" y="600" width="962" height="55" rx="10"
        fill="#1a3a1a" stroke="#0a200a" stroke-width="1"/>
  <text x="561" y="623" text-anchor="middle"
        font-size="14" font-weight="bold" fill="#ffffff">Sintesi: lo Spirito si realizza dialetticamente — nell'individuo, nella storia, nell'Assoluto</text>
  <text x="561" y="643" text-anchor="middle"
        font-size="11" fill="#90c890">«Il vero è l'intero»: la realtà va conosciuta nel suo processo globale, non nei suoi momenti parziali</text>

  <!-- ══ LEGENDA ══ -->
  <rect x="80" y="678" width="12" height="12" rx="2" fill="#1a3a1a"/>
  <text x="98" y="689" font-size="10" fill="#555">Nodo centrale / Sintesi</text>

  <rect x="235" y="678" width="12" height="12" rx="2" fill="#ddeedd" stroke="#3a7a3a" stroke-width="0.8"/>
  <text x="253" y="689" font-size="10" fill="#555">Triade dell'Assoluto</text>

  <rect x="370" y="678" width="12" height="12" rx="2" fill="#e8f4e8" stroke="#3a7a3a" stroke-width="0.8"/>
  <text x="388" y="689" font-size="10" fill="#555">Spirito Soggettivo e Oggettivo</text>

  <rect x="560" y="678" width="12" height="12" rx="2" fill="#c8eac8" stroke="#2a6a2a" stroke-width="1"/>
  <text x="578" y="689" font-size="10" fill="#555">Spirito Assoluto</text>

  <rect x="668" y="678" width="12" height="12" rx="2" fill="#f5f0e0" stroke="#907020" stroke-width="0.8"/>
  <text x="686" y="689" font-size="10" fill="#555">Metafore e conseguenze</text>

  <rect x="820" y="678" width="12" height="12" rx="2" fill="#eeeaf8" stroke="#6050a0" stroke-width="0.8"/>
  <text x="838" y="689" font-size="10" fill="#555">Eredità hegeliana</text>

  <line x1="950" y1="684" x2="970" y2="684" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <text x="976" y="689" font-size="10" fill="#555">Derivazione</text>

</svg>

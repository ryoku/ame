<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1122 794" width="1122" height="794"
     style="font-family: Georgia, 'Times New Roman', serif; background: #ffffff;">

  <title>Mappa concettuale: Il Positivismo</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#aaa"
            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══ NODO CENTRALE ══ -->
  <rect x="241" y="28" width="640" height="54" rx="12"
        fill="#0a3a5a" stroke="#001a30" stroke-width="1"/>
  <text x="561" y="51" text-anchor="middle"
        font-size="17" font-weight="bold" fill="#ffffff">Il Positivismo</text>
  <text x="561" y="72" text-anchor="middle"
        font-size="11" fill="#90d0f0">Francia/Inghilterra, XIX sec. — Scienza, progresso, rifiuto della metafisica</text>

  <!-- ══ ROW 2: CARATTERI GENERALI + VS ROMANTICISMO ══ y=100..175 -->

  <line x1="440" y1="82" x2="280" y2="100"
        stroke="#1a6a9a" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="682" y1="82" x2="840" y2="100"
        stroke="#aaa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-d)"/>

  <!-- Caratteri generali: x=50 y=100 w=430 h=78 -->
  <rect x="50" y="100" width="430" height="78" rx="9"
        fill="#d8eef8" stroke="#1a70a0" stroke-width="0.8"/>
  <text x="265" y="121" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#0a2a50">Caratteri generali</text>
  <line x1="68" y1="130" x2="462" y2="130" stroke="#60a0d0" stroke-width="0.5"/>
  <text x="265" y="146" text-anchor="middle" font-size="10" fill="#0a3a60">Fiducia in scienza e tecnica come unica forma di sapere valida</text>
  <text x="265" y="161" text-anchor="middle" font-size="10" fill="#0a3a60">Progresso inarrestabile dell'umanità — ottimismo — materialismo</text>
  <text x="265" y="171" text-anchor="middle" font-size="10" fill="#0a3a60">Metodo scientifico esteso alla società (sociologia) — rifiuto della metafisica</text>

  <!-- VS Romanticismo: x=500 y=100 w=572 h=78 -->
  <rect x="500" y="100" width="572" height="78" rx="9"
        fill="#eef5fa" stroke="#7090b0" stroke-width="0.8" stroke-dasharray="6,3"/>
  <text x="786" y="121" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#2a3a50">Positivismo vs Romanticismo</text>
  <line x1="518" y1="130" x2="1054" y2="130" stroke="#a0b0c0" stroke-width="0.5"/>
  <text x="786" y="146" text-anchor="middle" font-size="10" fill="#3a4a60">Analogie: visione ottimistica, sapere unificato, sviluppo storico progressivo</text>
  <text x="786" y="161" text-anchor="middle" font-size="10" fill="#3a4a60">Differenza: Romanticismo (Germania, anti-illuminista, pre-industriale)</text>
  <text x="786" y="171" text-anchor="middle" font-size="10" fill="#3a4a60">Positivismo (Francia, illuminista, contesto industriale e post-rivoluzionario)</text>

  <!-- ══ ROW 3: TRE AUTORI ══ y=200..400 -->

  <!-- Frecce nodo → tre autori -->
  <path d="M390 82 L390 186 L220 186 L220 200"
        fill="none" stroke="#1a6a9a" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="561" y1="82" x2="561" y2="200"
        stroke="#1a6a9a" stroke-width="1.2" marker-end="url(#arr)"/>
  <path d="M732 82 L732 186 L900 186 L900 200"
        fill="none" stroke="#1a6a9a" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Label -->
  <text x="561" y="196" text-anchor="middle"
        font-size="10" fill="#2a6090" font-style="italic">I tre grandi rappresentanti</text>

  <!-- COMTE: x=42 y=203 w=318 h=195 -->
  <rect x="42" y="203" width="318" height="195" rx="9"
        fill="#ddf0fa" stroke="#0a60a0" stroke-width="0.8"/>
  <text x="201" y="225" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#0a2a50">Auguste Comte (1798–1857)</text>
  <text x="201" y="241" text-anchor="middle"
        font-size="10" fill="#0a4070">Fondatore del Positivismo — Francia</text>
  <line x1="60" y1="249" x2="342" y2="249" stroke="#60b0d0" stroke-width="0.5"/>
  <!-- legge dei tre stadi -->
  <text x="201" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#0a3a60">Legge dei tre stadi</text>
  <text x="201" y="281" text-anchor="middle" font-size="10" fill="#0a4070">① Teologico: spiegazione sovrannaturale</text>
  <text x="201" y="296" text-anchor="middle" font-size="10" fill="#0a4070">    (feticismo → politeismo → monoteismo)</text>
  <text x="201" y="311" text-anchor="middle" font-size="10" fill="#0a4070">② Metafisico: concetti astratti (transizione)</text>
  <text x="201" y="326" text-anchor="middle" font-size="10" fill="#0a4070">③ Scientifico: leggi dei fenomeni — maturità</text>
  <line x1="60" y1="334" x2="342" y2="334" stroke="#60b0d0" stroke-width="0.5"/>
  <text x="201" y="350" text-anchor="middle" font-size="10" fill="#0a4070">Sociologia: statica (organizzazione) + dinamica (evoluzione)</text>
  <text x="201" y="365" text-anchor="middle" font-size="10" fill="#0a4070">Sociocrazia: regime guidato dalla filosofia positiva</text>
  <text x="201" y="381" text-anchor="middle" font-size="10" font-style="italic" fill="#1a5080">Fase finale: religione positiva — culto dell'Umanità</text>

  <!-- SPENCER + DARWIN: x=401 y=203 w=318 h=195 -->
  <rect x="401" y="203" width="318" height="195" rx="9"
        fill="#ddf0fa" stroke="#0a60a0" stroke-width="0.8"/>
  <text x="560" y="225" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#0a2a50">Spencer (1820–1903) + Darwin</text>
  <text x="560" y="241" text-anchor="middle"
        font-size="10" fill="#0a4070">Positivismo evoluzionistico — Inghilterra</text>
  <line x1="419" y1="249" x2="701" y2="249" stroke="#60b0d0" stroke-width="0.5"/>
  <text x="560" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#0a3a60">Darwin: selezione naturale</text>
  <text x="560" y="281" text-anchor="middle" font-size="10" fill="#0a4070">Adattamento + competizione + ereditarietà</text>
  <text x="560" y="296" text-anchor="middle" font-size="10" fill="#0a4070">L'uomo: discendente da specie animali (vs creazionismo)</text>
  <line x1="419" y1="304" x2="701" y2="304" stroke="#60b0d0" stroke-width="0.5"/>
  <text x="560" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="#0a3a60">Spencer: darwinismo sociale</text>
  <text x="560" y="336" text-anchor="middle" font-size="10" fill="#0a4070">La biologia determina i ruoli sociali alla nascita</text>
  <text x="560" y="351" text-anchor="middle" font-size="10" fill="#0a4070">Società militare → società industriale</text>
  <text x="560" y="366" text-anchor="middle" font-size="10" fill="#c02020">⚠ Implicazioni razziste — base del colonialismo</text>
  <text x="560" y="381" text-anchor="middle" font-size="10" font-style="italic" fill="#1a5080">La realtà non può essere cambiata: inutile impegnarsi</text>

  <!-- MILL: x=760 y=203 w=318 h=195 -->
  <rect x="760" y="203" width="318" height="195" rx="9"
        fill="#ddf0fa" stroke="#0a60a0" stroke-width="0.8"/>
  <text x="919" y="225" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#0a2a50">John Stuart Mill (1806–1873)</text>
  <text x="919" y="241" text-anchor="middle"
        font-size="10" fill="#0a4070">Positivismo utilitarista — Inghilterra</text>
  <line x1="778" y1="249" x2="1060" y2="249" stroke="#60b0d0" stroke-width="0.5"/>
  <text x="919" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#0a3a60">Logica: induzione + uniformità naturale</text>
  <text x="919" y="281" text-anchor="middle" font-size="10" fill="#0a4070">Conoscenza = esperienza fattuale → previsione dei fenomeni</text>
  <line x1="778" y1="289" x2="1060" y2="289" stroke="#60b0d0" stroke-width="0.5"/>
  <text x="919" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#0a3a60">Etica: principio di utilità</text>
  <text x="919" y="321" text-anchor="middle" font-size="10" fill="#0a4070">Massima felicità per il maggior numero</text>
  <text x="919" y="336" text-anchor="middle" font-size="10" fill="#0a4070">Piaceri qualitativi &gt; piaceri quantitativi</text>
  <line x1="778" y1="344" x2="1060" y2="344" stroke="#60b0d0" stroke-width="0.5"/>
  <text x="919" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#0a3a60">Politica: liberalismo — Sulla libertà (1859)</text>
  <text x="919" y="376" text-anchor="middle" font-size="10" fill="#0a4070">3 libertà: espressione, scelta, associazione</text>
  <text x="919" y="388" text-anchor="middle" font-size="10" font-style="italic" fill="#1a5080">«La verità non coincide con l'opinione dominante»</text>

  <!-- ══ ROW 4: EREDITÀ SCIENTIFICA + LIMITI ══ y=420..510 -->

  <!-- Frecce tre autori → row4 -->
  <path d="M201 398 L201 412 L310 412 L310 422"
        fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M560 398 L560 412 L560 422"
        fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M919 398 L919 412 L810 412 L810 422"
        fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Eredità scientifica: x=42 y=422 w=490 h=80 -->
  <rect x="42" y="422" width="490" height="80" rx="9"
        fill="#c8e8f8" stroke="#0a5080" stroke-width="0.8"/>
  <text x="287" y="443" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#0a1a40">Eredità scientifica e tecnica</text>
  <line x1="60" y1="452" x2="514" y2="452" stroke="#50a0c0" stroke-width="0.5"/>
  <text x="287" y="468" text-anchor="middle" font-size="10" fill="#0a3060">Grandi progressi: medicina, chimica, ingegneria</text>
  <text x="287" y="483" text-anchor="middle" font-size="10" fill="#0a3060">Motore a scoppio, energia elettrica, cinema, radio, ferrovia</text>
  <text x="287" y="494" text-anchor="middle" font-size="10" font-style="italic" fill="#1a5070">Base ideologica dell'industrializzazione e dell'urbanizzazione</text>

  <!-- Limiti e critiche: x=548 y=422 w=530 h=80 -->
  <rect x="548" y="422" width="530" height="80" rx="9"
        fill="#f5e8d8" stroke="#a06020" stroke-width="0.8" stroke-dasharray="6,3"/>
  <text x="813" y="443" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#4a2000">Limiti e critiche</text>
  <line x1="566" y1="452" x2="1060" y2="452" stroke="#d09040" stroke-width="0.5"/>
  <text x="813" y="468" text-anchor="middle" font-size="10" fill="#6a3000">Spencer: riduzione biologista della società → giustifica razzismo e colonialismo</text>
  <text x="813" y="483" text-anchor="middle" font-size="10" fill="#6a3000">Ottimismo sullo sfruttamento operaio (vs Marx: serve la rivoluzione)</text>
  <text x="813" y="494" text-anchor="middle" font-size="10" fill="#6a3000">Bergson (Francia): introduce finalismo spirituale nell'evoluzione</text>

  <!-- ══ SINTESI FINALE ══ y=524..578 -->

  <path d="M287 502 L287 516 L561 516 L561 524"
        fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M813 502 L813 516 L561 516"
        fill="none" stroke="#555" stroke-width="1"/>

  <rect x="80" y="524" width="962" height="55" rx="10"
        fill="#0a3a5a" stroke="#001a30" stroke-width="1"/>
  <text x="561" y="547" text-anchor="middle"
        font-size="14" font-weight="bold" fill="#ffffff">Sintesi: la scienza come unica guida del progresso umano e sociale</text>
  <text x="561" y="567" text-anchor="middle"
        font-size="11" fill="#90d0f0">Comte (legge tre stadi) · Spencer (evoluzione sociale) · Mill (utilità, libertà, induzione)</text>

  <!-- ══ LEGENDA ══ -->
  <rect x="80" y="604" width="12" height="12" rx="2" fill="#0a3a5a"/>
  <text x="98" y="615" font-size="10" fill="#555">Nodo centrale / Sintesi</text>

  <rect x="235" y="604" width="12" height="12" rx="2" fill="#d8eef8" stroke="#1a70a0" stroke-width="0.8"/>
  <text x="253" y="615" font-size="10" fill="#555">Caratteri generali</text>

  <rect x="360" y="604" width="12" height="12" rx="2" fill="#ddf0fa" stroke="#0a60a0" stroke-width="0.8"/>
  <text x="378" y="615" font-size="10" fill="#555">Tre autori principali</text>

  <rect x="484" y="604" width="12" height="12" rx="2" fill="#c8e8f8" stroke="#0a5080" stroke-width="0.8"/>
  <text x="502" y="615" font-size="10" fill="#555">Eredità scientifica</text>

  <rect x="608" y="604" width="12" height="12" rx="2" fill="#f5e8d8" stroke="#a06020" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="626" y="615" font-size="10" fill="#555">Limiti e critiche</text>

  <rect x="726" y="604" width="12" height="12" rx="2" fill="#eef5fa" stroke="#7090b0" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="744" y="615" font-size="10" fill="#555">Confronto (vs Romanticismo)</text>

  <line x1="920" y1="610" x2="940" y2="610" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <text x="946" y="615" font-size="10" fill="#555">Derivazione</text>

</svg>
